# Repo-local CodeQL model pack (data extensions only — no queries).
#
# Purpose: teach CodeQL's py/path-injection query that
# web_infra.security.resolve_within returns a contained, validated path
# (a `path-injection` barrier). CodeQL models no pathlib/relative_to
# containment check natively, so the containment this project enforces is
# invisible to the analyzer without this model — see
# docs/dev/diagnosis/codeql-path-injection-context.md (F-2).
#
# Applied automatically: CodeQL auto-discovers model packs placed under
# .github/codeql/extensions/*/ for BOTH default and advanced (workflow) setup,
# so codeql.yml needs no `packs:` entry, no registry, and no publish step. The
# `codeql/python-all: "*"` extension target is the community-standard wildcard
# (drift-proof across CLI updates; a pinned range would silently stop applying
# when python-all bumps). The benign "will become an error in future" warning on
# `*` is expected and shared by every model pack that uses it.
name: take-tempo-public/sartor-python-models
version: 0.0.1
library: true
extensionTargets:
  codeql/python-all: "*"
dataExtensions:
  - models/**/*.yml
