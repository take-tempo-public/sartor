# Repo-local CodeQL model pack (data extensions only — no queries).
#
# Purpose: teach CodeQL's py/path-injection query that
# web_infra.security.resolve_within returns a contained, validated path
# (a `path-injection` barrier). CodeQL models no pathlib/relative_to
# containment check natively, so the containment this project enforces is
# invisible to the analyzer without this model — see
# docs/dev/diagnosis/codeql-path-injection-context.md (F-2).
#
# Resolved locally from the checkout (referenced by .github/codeql/codeql-config.yml
# `packs:`); it is deliberately NOT published to a registry.
name: sartor/sartor-python-models
version: 0.0.1
library: true
extensionTargets:
  codeql/python-all: "*"
dataExtensions:
  - models/**/*.yml
