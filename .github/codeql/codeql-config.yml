# CodeQL analysis config (referenced by .github/workflows/codeql.yml).
#
# Carries two things the workflow used to set inline:
#   - the security-and-quality query suite (a superset of the default security
#     queries), and
#   - the repo-local model pack that declares web_infra.security.resolve_within
#     a py/path-injection barrier (python only). See
#     docs/dev/diagnosis/codeql-path-injection-context.md.
name: "sartor CodeQL config"

queries:
  - uses: security-and-quality

packs:
  python:
    - take-tempo-public/sartor-python-models
