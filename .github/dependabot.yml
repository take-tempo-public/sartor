# Dependabot version-update config (PX-26, E-2 machine badge set).
#
# `pip` ecosystem works directly against pyproject.toml's `dependencies` /
# `[project.optional-dependencies]` — no lockfile is committed today (out of
# scope for this branch; a pinned lockfile is a separate owner decision, see
# RELEASE_CHECKLIST.md Carry-forward ledger). `github-actions` covers the
# pinned action versions in .github/workflows/*.yml.
#
# Latent until the repo is pushed to GitHub and this file is read by
# Dependabot on the real remote (matches ci.yml's "committed but dormant
# until pushed" framing — see docs/governance/enforcement.md).

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # `github-actions` covers the workflows' action pins. Those pins are full commit
  # SHAs (OpenSSF Scorecard Pinned-Dependencies) with a `# vX.Y` trailing comment —
  # Dependabot reads that comment to know the current version and rewrites both the
  # SHA and the comment when it opens a bump PR, so pinning by SHA does not freeze
  # the actions at a stale version.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # docs-site/ (Fumadocs + Next) is a committed npm project with a lockfile, and
  # was previously watched only by Dependabot's *security* alerts (which need no
  # config) — never by version updates. That gap is how the tree sat on a
  # vulnerable nested postcss (GHSA-qx2v-qp2m-jg93) until an alert fired.
  - package-ecosystem: "npm"
    directory: "/docs-site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # typescript is held at ^6.0.3 deliberately — typescript@7's ESM restructure
    # dropped lib/typescript.js, which next@16.2.11's TypeScript detector hard-codes
    # an existsSync check against, so a genuinely-installed typescript@7.x reads as
    # "missing" and the build fails on every push. See
    # docs/dev/diagnosis/docs-site-typescript-detection.md. Remove this ignore once
    # next ships a detector that resolves typescript via its exports map.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
