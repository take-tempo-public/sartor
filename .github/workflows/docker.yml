name: Container image (GHCR)

# Build + push the Sartor container to GitHub Container Registry on a version tag.
# The image is the batteries-included distribution path (Chromium + vector index
# baked in) — the recommended way to run Sartor without a local Python setup.
#
# Prereqs (one-time, [HUMAN]): the repo must live at github.com/take-tempo-public/sartor
# (image namespace below) and — after the first push — the GHCR package should be
# linked to the repo + set public in the repo's Packages settings. No secrets
# needed; GITHUB_TOKEN authenticates the push.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Least-privilege by default: the workflow-level token is read-only, and the one
# job that needs to push a package elevates itself. A top-level `packages: write`
# would hand write scope to every job in the file — what OpenSSF Scorecard's
# Token-Permissions check flags (it scored 0/10 for exactly this).
permissions:
  contents: read

jobs:
  image:
    name: Build + push (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # arm64 emulation so mac / Apple-Silicon users get a native image too.
      # PX-43 (F-tci-08) owner decision (RELEASE_ARC.md dec 13, 2026-07): keep
      # the arm64 build despite QEMU's ~3-5x build-time cost — it only runs on
      # v-tags (release cadence, not every push), so the cost is bounded and
      # native Apple-Silicon support is worth it.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/take-tempo-public/sartor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build + push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
