name: Publish CodeQL model pack

# Publishes the repo-local CodeQL model pack
# (.github/codeql/sartor-python-models) to GHCR so the CodeQL analysis workflow
# (codeql.yml) can resolve it BY NAME and apply its data extensions. The pack
# declares web_infra.security.resolve_within a py/path-injection barrier — the
# only mechanism CodeQL's Python query exposes for our containment check. See
# docs/dev/diagnosis/codeql-path-injection-context.md.
#
# Same GHCR rails as docker.yml (built-in GITHUB_TOKEN + packages: write). No
# personal token or registry secret is required — the pack lives on the same
# GitHub instance that consumes it.
#
# Consume order: the pack must exist in GHCR BEFORE codeql.yml runs. Bump
# codeql-pack.yml `version:` on every content change (GHCR rejects re-publishing
# an existing version); codeql-config.yml references the pack without a version,
# so the analysis always resolves the latest.

on:
  workflow_dispatch:
  push:
    # TODO(pre-merge): restrict to `branches: [main]`. The feature branch is
    # included ONLY so the pack can be published + verified before merge
    # (workflow_dispatch is not dispatchable from a non-default branch).
    branches:
      - main
      - fix/codeql-path-injection-context
    paths:
      - ".github/codeql/sartor-python-models/**"
      - ".github/workflows/publish-codeql-pack.yml"

permissions:
  contents: read

jobs:
  publish:
    name: Publish sartor-python-models to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the model pack to GHCR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up CodeQL CLI
        id: setup
        uses: github/codeql-action/setup-codeql@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3

      - name: Publish model pack (idempotent)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODEQL='${{ steps.setup.outputs.codeql-path }}'
          PACK=.github/codeql/sartor-python-models
          "$CODEQL" pack install "$PACK"
          # GHCR rejects re-publishing an existing version. Merging this pack to
          # main re-fires this workflow with the same version, so a
          # version-already-exists conflict is the EXPECTED no-op, not a failure
          # — tolerate only that, and surface any other error unchanged.
          set +e
          OUT=$("$CODEQL" pack publish "$PACK" 2>&1); RC=$?
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            if echo "$OUT" | grep -qiE "already (exist|publish)|conflict|409|version.*exists"; then
              echo "::notice::Pack version already in GHCR — nothing to publish (idempotent)."
              exit 0
            fi
            exit $RC
          fi
