name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PX-43 (2026-07 efficiency review, F-tci-04): without this, a force-push or
# rapid follow-up commit lets the previous push's/PR's full run (quality
# matrix + pip-audit + eval-smoke + ux) keep running to completion instead of
# being superseded — wasted runner time on jobs whose result nobody will read.
# One run per ref at a time; a new push cancels the in-flight one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # PX-43 (F-tci-07) owner decision (RELEASE_ARC.md dec 13, 2026-07): fail-fast
      # OFF, deliberately — seeing all three Python versions' failures in one push
      # beats stopping at the first and re-discovering the rest one push at a time.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      # fetch-depth: 0 (full history) — tests/test_enforcement_core.py does git
      # archaeology (`git show b2c83d2:.claude-plugin/hooks/...`) to prove the
      # modularized hooks stay behaviorally equivalent to the pre-migration
      # standalone scripts. The default shallow (depth-1) checkout doesn't fetch
      # that historical object, so `git show` fails ("invalid object name"). The
      # test also self-guards (skips if OLD_SHA is unreachable), but here we want
      # it to actually run, so fetch the full history.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PX-43 (F-tci-06): shared with the `eval-smoke` job below — see
      # .github/actions/setup-python-env/action.yml.
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      # PX-55 (2026-07 efficiency review): the four steps below (ruff check,
      # ruff format --check, mypy, pytest) are the single definition of "gate
      # green" — `scripts/gate.py` — also invoked by contributors locally
      # (CONTRIBUTING.md) and named in AGENTS.md. Whole-tree format check
      # catches committed format drift that `ruff check` (lint) does NOT
      # (the commit hook only checks STAGED files); deterministic because
      # ruff is exact-pinned in pyproject.toml's dev extra (chore/ruff-format-pin).
      - name: Quality gate (ruff check + ruff format --check + mypy + pytest)
        run: python -m scripts.gate

      # Portable-enforcement-core CI backstop (feat/portable-enforcement-core, 2026-07-08):
      # a repo-wide secrets scan, independent of whether a contributor's local hooks
      # (Claude PreToolUse or the opt-in .githooks/, see .githooks/README.md) ran at all.
      # Per docs/governance/enforcement.md ("CI is committed but latent until the git
      # remote activates"), this whole workflow — this step included — is authored now
      # and starts running for real only once `main` is pushed to a GitHub remote
      # (Sprint 8.7); it is not a new latency mechanism of its own.
      - name: Enforcement guards (repo-wide secrets backstop)
        run: python -m scripts.enforcement.ci_backstop

  pip-audit:
    # PX-54 (2026-07 efficiency review, F-tci-09): a minimal dependency-vulnerability
    # scan riding PX-26's badge/Dependabot work. Deliberately a SEPARATE job with
    # `continue-on-error: true` and no `needs: quality` — per the prescription's
    # own text ("land deliberately — a CVE-triggered CI failure is a new triage
    # source for a solo maintainer"), this is advisory-only and must never block
    # the `quality`/PR gate. Promoting it to blocking is a future, explicit decision.
    name: pip-audit (advisory, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Audit installed dependencies
        run: pip-audit

  eval-smoke:
    name: Smoke eval (synthetic, label-gated)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'eval')
    needs: quality
    steps:
      - uses: actions/checkout@v4

      # PX-43 (F-tci-06): shared with the `quality` job above — see
      # .github/actions/setup-python-env/action.yml.
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.13"

      - name: Run synthetic smoke evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python evals/runner.py --suite synthetic --subset smoke

  ux:
    # PX-25 (2026-06 product-excellence review, F-qe-rel-01 P0): the browser-driven
    # UX/a11y/PDF tier ran on the maintainer's laptop only — CI had no `playwright
    # install`, so `pytest -m ux` was silently collected-then-skipped (see
    # ACCESSIBILITY.md "Known gaps" and conftest's Chromium-absent skip guard). This
    # job closes that gap. It is a SEPARATE job from `quality` (deliberate — see
    # docs/dev/reviews/2026-06-product-excellence/03-prescriptions/release-pass-plan.md
    # "G-1" + docs/governance/enforcement.md "New CI gates"): keeps the fast
    # py3.11-3.13 lint/type/unit matrix from being slowed by a Chromium install + a
    # browser-driven suite. `needs`/concurrency wiring between jobs is deliberately
    # NOT decided here — that is PX-43 (Phase 7), out of scope for this branch.
    #
    # Single Python version (not matrixed): Playwright/browser behavior is not
    # Python-version-sensitive, so matrixing would ~triple runtime for no coverage
    # gain. Picked 3.12 — the middle of the `quality` matrix's 3.11-3.13 range — so
    # the two non-matrixed jobs in this file (this one + `eval-smoke` @ 3.13) sit at
    # different points of the support range instead of both re-pinning the newest.
    #
    # --- Flake policy (HONEST, not masking) -----------------------------------------
    # A real timing-flake class hits the compose/skills Playwright tests: they drive
    # an async background-reload cascade against a live Flask server, and under CPU
    # contention a settle/repaint can lose a race with an assertion timeout. First
    # seen under heavy LOCAL multi-suite concurrency and hardened repeatedly (the
    # `data-compose-bg-pending` settle counter 2026-07-06; then 2026-07-12 awaiting
    # the cascade reloads + auto-retry `expect().to_have_count/value` + 15s load
    # headroom). Each fix made its target test pass but did NOT eliminate the CLASS.
    #
    # This policy previously assumed the class "structurally cannot reproduce" in CI
    # (one process, one server, no sibling suite). The first real runs on the public
    # repo DISPROVED that: the shared GitHub runner has its own load variance (limited
    # cores, noisy neighbours) that reproduces the SAME class — across four runs a
    # DIFFERENT compose/skills subset failed each time, and a test that passed one run
    # re-flaked the next despite a correct structural fix. That is precisely the
    # "genuinely new CI-only flake class, characterized" that this policy always said
    # WOULD warrant a scoped, documented retry (owner-authorized 2026-07-12).
    #
    # So: a SCOPED retry on the `ux` tier only — `--reruns 2` reruns ONLY the tests
    # that failed, up to twice. A genuine flake passes on a rerun (green); a real
    # regression fails all three attempts (red) — the retry cannot mask a real bug,
    # only absorb the characterized timing variance. Deliberately NOT applied to the
    # `quality` matrix pytest (`scripts/gate.py` — deterministic, stays strict) nor to
    # the PDF slice below (deterministic renders, not in the browser-E2E cascade class).
    # ----------------------------------------------------------------------------------
    #
    # PDF slice: RELEASE_ARC/RELEASE_CHECKLIST call this the "UX/a11y/PDF tier", but
    # `pytest -m ux` alone does not cover the PDF end-to-end tests — the 4 tests in
    # tests/test_pdf_render.py are marked `slow` only (same Chromium dependency, not
    # part of the Playwright-page-driving `ux` harness). The last step below runs
    # them too (`-m "slow and not ux"`), reusing the Chromium install already done
    # for the `ux` tier rather than standing up a second job for 4 tests.
    #
    # ACTIVATION NOTE — owed at the [HUMAN] GitHub-repo-creation step (RELEASE_ARC
    # Phase 4): this job existing in ci.yml does NOT make it a "required check" —
    # that is a GitHub repo setting (Settings -> Branches -> branch protection rule
    # for `main` -> "Require status checks to pass before merging"), which cannot be
    # configured until the repo exists. When it does: mark this job's check (its
    # `name:` below, "UX / a11y / PDF (Playwright, py3.12)") AND the `quality`
    # matrix's 3 checks ("Lint, type-check, test (py3.11)" / "(py3.12)" / "(py3.13)")
    # required. Do NOT mark `eval-smoke` required — it only runs when the `eval`
    # label is applied, so a required-but-conditional check would block every
    # unlabeled PR forever.
    name: UX / a11y / PDF (Playwright, py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve installed Playwright version (cache key input)
        id: playwright-version
        run: echo "version=$(pip show playwright | grep '^Version:' | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      # actions/cache is GitHub-maintained (same `actions/` org as checkout/setup-python
      # above) — not a new marketplace-trust action. Warranted because setup-python's
      # `cache: pip` above only caches the pip package cache, not the ~150MB Chromium
      # browser binary `playwright install` downloads; caching it removes the slowest
      # step in this job on a cache hit.
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      # Cache hit skips the ~150MB browser download, but the runner VM is still
      # fresh each run, so the OS-level packages `--with-deps` installs via apt are
      # NOT preserved by the cache above (it only covers ~/.cache/ms-playwright) —
      # this still needs to run every time.
      - name: Install Playwright OS dependencies (cache hit — browser already cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Pytest (UX / a11y tier)
        # Scoped retry for the characterized compose/skills timing-flake class — see
        # the "Flake policy" comment above. Reruns ONLY failed tests, up to twice;
        # a real regression fails all three attempts. NOT applied to the strict
        # quality-matrix pytest or the deterministic PDF slice below.
        run: pytest -m ux --reruns 2 --reruns-delay 1

      - name: Pytest (PDF end-to-end render — shares the Chromium install above)
        run: pytest -m "slow and not ux"
