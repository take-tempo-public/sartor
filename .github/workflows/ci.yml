name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      # Whole-tree format gate — catches committed format drift that `ruff check` (lint) does
      # NOT (the commit hook only checks STAGED files). Deterministic because ruff is exact-pinned
      # in pyproject.toml's dev extra; the two are one inseparable fix (chore/ruff-format-pin).
      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (type-check)
        run: mypy .

      - name: Pytest (unit tests)
        run: pytest

      # Portable-enforcement-core CI backstop (feat/portable-enforcement-core, 2026-07-08):
      # a repo-wide secrets scan, independent of whether a contributor's local hooks
      # (Claude PreToolUse or the opt-in .githooks/, see .githooks/README.md) ran at all.
      # Per docs/governance/enforcement.md ("CI is committed but latent until the git
      # remote activates"), this whole workflow — this step included — is authored now
      # and starts running for real only once `main` is pushed to a GitHub remote
      # (Sprint 8.7); it is not a new latency mechanism of its own.
      - name: Enforcement guards (repo-wide secrets backstop)
        run: python -m scripts.enforcement.ci_backstop

  eval-smoke:
    name: Smoke eval (synthetic, label-gated)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'eval')
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run synthetic smoke evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python evals/runner.py --suite synthetic --subset smoke
