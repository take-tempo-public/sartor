name: Release (PyPI)

# Build the wheel + sdist on a version tag and publish to PyPI via OIDC Trusted
# Publishing (no stored token). One-time [HUMAN] setup is documented in
# docs/install.md (PyPI → project → Publishing → add this repo/workflow/env).
#
# The wheel-packaging gap that used to block this workflow (`pip install sartor`
# 500ing on first page load because templates/static/personas/docs-wiki weren't
# shipped) is FIXED as of `fix/packaging-install` (2026-07-07) — Flask now gets
# absolute template/static folders, and the data dirs ship via
# `[tool.setuptools.package-data]`, verified end-to-end with a real fresh-venv
# `pip install <wheel>` serving `GET /` (200) from OUTSIDE the source tree. The
# publish job's GATE step (which used to fail it on purpose) is removed.
# Publishing is still `[HUMAN]`-blocked on a separate, unrelated prerequisite:
# the PyPI Trusted Publisher config + GHCR package visibility, both gated on the
# GitHub repo rename to `take-tempo-public/sartor` (see
# docs/dev/RELEASE_CHECKLIST.md "Carry-forward").

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build + verify sdist/wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — sign the build provenance (see the attest step)
      attestations: write # write the provenance attestation to the repo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      # Charter D-7: the tag is semver (v1.1.0-rc.1), the package version is its PEP
      # 440 normalization (1.1.0rc1) — the SAME release in two dialects. A raw string
      # compare (what this step used to do) is correct only for final releases and
      # fails EVERY pre-release, at publish time, on a tag that is already public.
      # scripts/release_version.py owns the mapping; it also rejects versions outside
      # the sanctioned alpha/beta/rc ladder, which pip could not order.
      - name: Tag matches pyproject version (charter D-7)
        if: github.event_name == 'push'
        run: |
          python -m pip install --quiet packaging
          python -m scripts.release_version --tag "${GITHUB_REF_NAME}"

      - name: Console-script smoke (import + entry point resolve)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/sartor --help

      # Signed-Releases (OpenSSF Scorecard): sign the built sdist + wheel with a
      # Sigstore-backed provenance attestation, so a consumer can verify these
      # artifacts were produced by THIS workflow from THIS repo at this commit
      # (`gh attestation verify <file> --repo take-tempo-public/sartor`). Keyless
      # — the OIDC token above is the identity; no signing key is stored. Runs
      # before the upload so the attestation covers exactly the files published.
      - name: Attest build provenance (sdist + wheel)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "dist/*"

      # PX-43 (F-tci-10): explicit retention instead of the GitHub default
      # (90 days), matching the existing docs-deploy.yml precedent — these are
      # published to PyPI immediately after, so 30 days is plenty for
      # post-release debugging.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC — no PyPI token stored in the repo
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
